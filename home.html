<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home Page</title>
    <!-- DaisyUI CDN -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font aswame cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
    <!-- tailwind css link -->
    <link rel="stylesheet" href="./css/tailwind.config.css" />
    <!-- css link -->
    <link rel="stylesheet" href="./css/style.css" />
</head>

<body>
    <!--========================== top section ================================-->
    <section id="top" class="mb-2">
        <div id="top-section" class="w-[500px] mx-auto flex justify-between items-center mt-5 bg-[#ffff] shadow p-2">
            <div class="right-section flex">
                <img src="assets/Group.png" alt="group img" class="h-[50px]" />
                <div class="ml-4">
                    <!-- available-amount id -->
                    <h3 class="font-bold text-lg">
                        $ <span id="available-amount">45000</span>
                    </h3>
                    <p class="text-gray-600">Available Balance</p>
                </div>
            </div>
            <div class="right-section">
                <button type="submit" class="btn text-gray-600">
                    <i class="fa-solid fa-arrow-right-from-bracket rotate-180"></i>LogOut
                </button>
            </div>
            <hr />
        </div>
    </section>

    <!--========================== top section end ============================-->
    <!--========================== welcome section =============================-->
    <section id="welcome-section" class="w-[500px] mx-auto py-5 bg-[#ffff] shadow">
        <h2 class="font-bold text-2xl my-1.5">🔥 Welcome to Payooo!</h2>
        <p class="w-[402px] text-gray-600 ml-2">
            Enjoy easy and convenient financial services with us. Cashout charge is
            low and
        </p>
    </section>
    <!--======================== welcome section end ==============================-->
    <!--=================== card section ============================= -->
    <section id="card-section" class="w-[500px] mx-auto py-5 bg-[#ffff] shadow">
        <div class="card-description">
            <div id="addMoney-button"
                class="card-1 toggle-btn w-[123px] h-[90px] rounded-2xl border border-gray-400 flex justify-center items-center flex-col">
                <img src="assets/purse1.png" alt="" />
                <p class="font-bold">Add Money</p>
            </div>

            <div id="cashOut-button"
                class="card-2 toggle-btn w-[123px] h-[90px] rounded-2xl border border-gray-400 flex justify-center items-center flex-col">
                <img src="assets/send1.png" alt="" />
                <p class="font-bold">Cashout</p>
            </div>

            <div id="transfer-button"
                class="card-3 toggle-btn w-[123px] h-[90px] rounded-2xl border border-gray-400 flex justify-center items-center flex-col">
                <img src="assets/money1.png" alt="" />
                <p class="font-bold">Transfer Money</p>
            </div>

            <div id="get-bonus-button"
                class="toggle-btn card-4 w-[123px] h-[90px] rounded-2xl border border-gray-400 flex justify-center items-center flex-col">
                <img src="assets/bonus1.png" alt="" />
                <p class="font-bold">Get Bonus</p>
            </div>

            <div id="pay-bill-button"
                class="toggle-btn card-5 w-[123px] h-[90px] rounded-2xl border border-gray-400 flex justify-center items-center flex-col">
                <img src="assets/wallet1.png" alt="" />
                <p class="font-bold">Pay Bill</p>
            </div>

            <div id="transaction-button"
                class="toggle-btn card-6 w-[123px] h-[90px] rounded-2xl border border-gray-400 flex justify-center items-center flex-col">
                <img src="assets/transaction1.png" alt="" />
                <p class="font-bold">Transactions</p>
            </div>
        </div>
    </section>
    <!--======================== card section end ===============================-->

    <!-- add money section -->
    <section id="add-money-section" class="toggle-section w-[500px] mx-auto bg-[#ffff] shadow mt-7">
        <h1 class="text-left ml-3 text-2xl font-bold">Add Money</h1>
        <div id="add-money-info" class="flex flex-col justify-center items-center">
            <form class="rounded-2xl bg-[#FFFFFF] p-5">
                <div>
                    <select id="bank-info" class="select bg-[#F4F5F7] rounded-4xl mt-2">
                        <option>Select A Bank</option>
                        <option>Brack Bank</option>
                        <option>Duch Bangla Bank</option>
                        <option>Islami Bank</option>
                    </select>
                </div>
                <div id="bank-account-number" class="mt-4">
                    <label for="account-number" class="ml-2 color-[#080808] font-medium">Bank Account Number</label>
                    <input type="text" placeholder="Enter 11 digit account number" id="account-number"
                        class="input input-lg bg-[#F4F5F7] rounded-4xl mt-2" />
                </div>
                <div id="amount-witdraw-number" class="mt-4">
                    <label for="add-withdraw-number" class="ml-2 color-[#080808] font-medium">Amount to Add</label>
                    <input type="number" placeholder="Add Amount to withdraw" id="add-withdraw-number"
                        class="input input-lg bg-[#F4F5F7] rounded-4xl mt-2" />
                </div>
                <div id="account-pin-number" class="mt-4">
                    <label for="pin-number" class="ml-2 color-[#080808] font-medium">Pin Number</label>
                    <input type="password" placeholder="Enter 4 digit pin number" id="pin-number"
                        class="input input-lg bg-[#F4F5F7] rounded-4xl mt-2" />
                </div>
                <!-- login button -->
                <button id="add-money-button" class="btn btn-primary w-80 mt-5 rounded-4xl">
                    Add Money
                </button>
            </form>
        </div>
    </section>
    <!--====================== add money section end  ===========================-->

    <!--=========================== cash out section  start =========================-->
    <section id="cash-out-section" style="display: none"
        class="toggle-section w-[500px] mx-auto bg-[#ffff] shadow mt-7">
        <h1 class="text-left ml-3 text-2xl font-bold">Cash Out</h1>
        <div id="cash-out" class="flex flex-col justify-center items-center">
            <form class="rounded-2xl bg-[#FFFFFF] p-5">
                <div id="agent-account-number" class="mt-4">
                    <label for="account-number" class="ml-2 color-[#080808] font-medium">Agent Number</label>
                    <input type="text" placeholder="Enter 11 digit account number" id="cashout-agent-number"
                        class="input input-lg bg-[#F4F5F7] rounded-4xl mt-2" />
                </div>
                <div id="amount-witdraw-number" class="mt-4">
                    <label for="add-withdraw-number" class="ml-2 color-[#080808] font-medium">Amount</label>
                    <input type="number" placeholder="Enter Amount to Withdraw" id="cashout-withdraw-number"
                        class="input input-lg bg-[#F4F5F7] rounded-4xl mt-2" />
                </div>
                <div id="account-pin-number" class="mt-4">
                    <label for="pin-number" class="ml-2 color-[#080808] font-medium">Pin Number</label>
                    <input type="password" placeholder="Enter 4 digit pin number" id="cashout-pin-number"
                        class="input input-lg bg-[#F4F5F7] rounded-4xl mt-2" />
                </div>
                <!-- withdraw money button -->
                <button id="withdraw-money-button" class="btn btn-primary w-80 mt-5 rounded-4xl">
                    Withdraw Money
                </button>
            </form>
        </div>
    </section>
    <!--========================= cash out section end ============================== -->
    <!-- ============================ transfer section start ===============================-->
    <section id="transfer-section" style="display: none"
        class="toggle-section w-[500px] mx-auto bg-[#ffff] shadow mt-7">
        <h1 class="text-left ml-3 text-2xl font-bold">Transfer Money</h1>
        <div id="transfer-money-section" class="flex flex-col justify-center items-center">
            <form class="rounded-2xl bg-[#FFFFFF] p-5">
                <div id="transfer-account-number" class="mt-4">
                    <label for="transfer-input-account-number" class="ml-2 color-[#080808] font-medium">User Account
                        Number</label>
                    <input type="text" placeholder="Enter 11 digit number" id="transfer-input-account-number"
                        class="input input-lg bg-[#F4F5F7] rounded-4xl mt-2" />
                </div>
                <div id="transfer-amount-number" class="mt-4 flex flex-col">
                    <label for="transfer-amount-input-number" class="ml-2 color-[#080808] font-medium">Amount</label>
                    <input type="number" placeholder="Enter amount to transfer" id="transfer-amount-input-number"
                        class="input input-lg bg-[#F4F5F7] rounded-4xl mt-2" />
                </div>
                <div id="transfer-pin-number" class="mt-4">
                    <label for="transfer-input-pin-number" class="ml-2 color-[#080808] font-medium">Pin Number</label>
                    <input type="password" placeholder="Enter 4 digit pin number" id="transfer-input-pin-number"
                        class="input input-lg bg-[#F4F5F7] rounded-4xl mt-2" />
                </div>
                <!-- transfer money button -->
                <button id="transfer-money-button" class="btn btn-primary w-80 mt-5 rounded-4xl">
                    Send Now
                </button>
            </form>
        </div>
    </section>
    <!--============================= transfer section end ===================================-->
    <!--=========================== get bonous section start ============================== -->
    <section id="get-bonus-section" style="display: none"
        class="toggle-section w-[500px] mx-auto bg-[#ffff] shadow mt-7">
        <h1 class="text-left ml-3 text-2xl font-bold">Get Bonus</h1>
        <div id="bonus-description-section" class="flex flex-col justify-center items-center">
            <form class="rounded-2xl bg-[#FFFFFF] p-5">
                <div id="bonus-account-number" class="mt-4">
                    <label for="get-bonus-input-number" class="ml-2 color-[#080808] font-medium">Enter Bonus
                        Coupon</label>
                    <input type="text" placeholder="Enter your coupon" id="get-bonus-input-number"
                        class="input input-lg bg-[#F4F5F7] rounded-4xl mt-2" />
                </div>
                <!-- get bonus button -->
                <button id="bonus-button" class="btn btn-primary w-80 mt-5 rounded-4xl">
                    Get Bonus
                </button>
            </form>
        </div>
    </section>
    <!-- ================================get bonous section end  ===============================-->
    <!--============================ pay bill section start ======================================-->
    <section id="pay-bill-section" style="display: none"
        class="toggle-section w-[500px] mx-auto bg-[#ffff] shadow mt-7">
        <h1 class="text-left ml-3 text-2xl font-bold">Pay Bill</h1>
        <div id="add-money-info" class="flex flex-col justify-center items-center">
            <form class="rounded-2xl bg-[#FFFFFF] p-5">
                <div>
                    <select id="bill-bank-info" class="select bg-[#F4F5F7] rounded-4xl mt-2">
                        <option>Select To Pay</option>
                        <option>Gas</option>
                        <option>Water</option>
                        <option>Internet</option>
                    </select>
                </div>
                <div id="biller-account-number" class="mt-4">
                    <label for="bill-account-input-number" class="ml-2 color-[#080808] font-medium">Biller Account
                        Number</label>
                    <input type="text" placeholder="Enter account number" id="bill-account-input-number"
                        class="input input-lg bg-[#F4F5F7] rounded-4xl mt-2" />
                </div>
                <div id="amount-to-pay" class="mt-4">
                    <label for="add-withdraw-number" class="ml-2 color-[#080808] font-medium">Amount to Pay</label>
                    <input type="number" placeholder="Add Amount to pay" id="amount-to-pay-input"
                        class="input input-lg bg-[#F4F5F7] rounded-4xl mt-2" />
                </div>
                <div id="pay-bill-pin-number" class="mt-4">
                    <label for="pay-bill-input-number" class="ml-2 color-[#080808] font-medium">Pin Number</label>
                    <input type="password" placeholder="Enter 4 digit pin number" id="pay-bill-input-number"
                        class="input input-lg bg-[#F4F5F7] rounded-4xl mt-2" />
                </div>
                <!-- pay bill button -->
                <button id="bill-button" class="btn btn-primary w-80 mt-5 rounded-4xl">
                    Pay Now
                </button>
            </form>
        </div>
    </section>
    <!-----==================== pay bill section end ===============================---->
    <!-----========================== transction section start ==============================---->

    <section id="transaction-section" style="display: none"
        class="toggle-section w-[500px] mx-auto bg-[#ebe4e4] shadow mt-7">
        <!--- transction top part -->
        <div class="transction-header flex justify-between items-center mr-2 py-4">
            <h1 class="text-left ml-3 text-2xl font-bold">Transaction History</h1>
            <h4 class="color-[#080808]">View All</h4>
        </div>
        <div id="transaction-container"></div>
    </section>
    <!-----========================= transction part end ======================================--->

    <!-- js link -->
    <script src="js/home.js"></script>
</body>

</html>
